<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ServiceFlow — PDF</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-app: #eef2f6;
    --panel: #ffffff;
    --border: #e3e8ef;
    --text: #0f172a;
    --muted: #64748b;
    --primary: #0b4f8a;
    --primary-ink: #062f53;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  html, body { margin: 0; padding: 0; background: #eef2f6; font-family: 'Inter', system-ui, sans-serif; color: #0f172a; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
  .phone-scroll::-webkit-scrollbar { width: 0; height: 0; }
  input:focus, textarea:focus, select:focus, button:focus { outline: none; }
  .tap { transition: none; }
  .shake, .fadein { animation: none !important; opacity: 1 !important; transform: none !important; }
  .spinner { display: none; }
  .snack { animation: none; }

  /* Print layout */
  @page { size: A4 portrait; margin: 0; }
  @media print {
    html, body {
      background: #ffffff !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .page {
      break-after: page;
      break-inside: avoid;
      page-break-after: always;
      page-break-inside: avoid;
    }
    .page:last-child { break-after: auto; page-break-after: auto; }
  }

  .page {
    width: 210mm;
    min-height: 297mm;
    box-sizing: border-box;
    padding: 18mm 12mm;
    background: #ffffff;
    margin: 0 auto 10mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .page-header {
    width: 100%;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 10mm;
    border-bottom: 1px solid #e3e8ef;
    margin-bottom: 12mm;
  }
  .page-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10pt;
    color: #64748b;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .page-title {
    font-size: 20pt;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.4px;
    margin-top: 2mm;
  }
  .page-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10pt;
    color: #94a3b8;
  }
  .page-footer {
    position: absolute;
    bottom: 10mm;
    left: 12mm;
    right: 12mm;
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9pt;
    color: #94a3b8;
    padding-top: 6mm;
    border-top: 1px solid #eef2f6;
  }
  .phone-slot {
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0B4F8A"/>
  <g transform="translate(60,60)" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round">
    <path d="M10 8 Q 8 8 8 10 L 8 30 Q 8 32 10 32 L 40 32 Q 42 32 42 34 L 42 60 Q 42 62 40 62 L 10 62"/>
    <path d="M56 8 L 56 62 M 56 8 L 78 8 M 56 30 L 72 30"/>
  </g>
</svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/theme.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/frame.jsx"></script>
<script type="text/babel" src="src/components.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/screens/login.jsx"></script>
<script type="text/babel" src="src/screens/signup.jsx"></script>
<script type="text/babel" src="src/screens/client.jsx"></script>
<script type="text/babel" src="src/screens/os.jsx"></script>
<script type="text/babel" src="src/screens/dashboard.jsx"></script>
<script type="text/babel" src="src/screens/os_list.jsx"></script>

<script type="text/babel">
  function PdfApp() {
    const theme = getTheme('light', 'blue');
    const noop = () => {};
    const nav = { push: noop, pop: noop, replace: noop };
    const showMessage = noop;

    const pages = [
      { n: '01', title: 'Login', subtitle: 'Autenticação do usuário',
        render: () => <LoginScreen theme={theme} nav={nav} showMessage={showMessage} /> },
      { n: '02', title: 'Cadastro de usuário', subtitle: 'Criação de nova conta',
        render: () => <SignupScreen theme={theme} nav={nav} showMessage={showMessage} /> },
      { n: '03', title: 'Dashboard', subtitle: 'Visão geral da operação',
        render: () => <DashboardScreen theme={theme} nav={nav} showMessage={showMessage}
                        osList={INITIAL_OS} clients={INITIAL_CLIENTS} /> },
      { n: '04', title: 'Nova ordem de serviço', subtitle: 'Registro de OS com evidências',
        render: () => <OSScreen theme={theme} nav={nav} showMessage={showMessage}
                        clients={INITIAL_CLIENTS} onSave={noop} /> },
      { n: '05', title: 'Novo cliente', subtitle: 'Cadastro de cliente com máscaras',
        render: () => <ClientScreen theme={theme} nav={nav} showMessage={showMessage}
                        clients={INITIAL_CLIENTS} setClients={noop} /> },
      { n: '06', title: 'Lista de ordens de serviço', subtitle: 'Filtro por status + busca',
        render: () => <OSListScreen theme={theme} nav={nav} showMessage={showMessage}
                        osList={INITIAL_OS} clients={INITIAL_CLIENTS} params={{filter:'total'}} /> },
    ];

    // Fit phone (390x844) onto A4 page content area
    // Content area ~ 186mm wide × 232mm tall (after header + footer).
    // 1mm ≈ 3.78px at 96dpi; ~703 × 877 px. Phone is 390×844 → scale ≈ 0.88
    const phoneScale = 0.82;

    return (
      <>
        {pages.map((p, i) => (
          <div className="page" key={p.n}>
            <div className="page-header">
              <div>
                <div className="page-kicker">ServiceFlow · {p.n} / 06</div>
                <div className="page-title">{p.title}</div>
                <div style={{ fontSize: '10pt', color: '#64748b', marginTop: '2mm' }}>{p.subtitle}</div>
              </div>
              <div className="page-num">Android · 390×844</div>
            </div>

            <div className="phone-slot" style={{
              transform: `scale(${phoneScale})`,
              transformOrigin: 'top center',
              width: PHONE_WIDTH,
              height: PHONE_HEIGHT,
            }}>
              <div style={{ position: 'relative', width: PHONE_WIDTH, height: PHONE_HEIGHT }}>
                <DeviceFrame theme={theme}>{p.render()}</DeviceFrame>
              </div>
            </div>

            <div className="page-footer">
              <div>ServiceFlow — Especificação de Interface (Sprint UI)</div>
              <div>pág. {p.n}</div>
            </div>
          </div>
        ))}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<PdfApp />);

  // Auto-print once fonts + Babel + layout are ready
  (async () => {
    try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
    // Wait for Babel-transformed scripts to execute + React render
    await new Promise(r => setTimeout(r, 800));
    // Extra safety
    await new Promise(r => setTimeout(r, 500));
    // window.print(); // disabled for Canva import
  })();
</script>
</body>
</html>
