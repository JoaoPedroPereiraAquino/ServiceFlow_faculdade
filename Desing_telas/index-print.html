<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ServiceFlow — Catálogo de Telas (Print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-app: #EEF2F6;
    --primary: #0F766E;
    --primary-ink: #083F3C;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-app);
    font-family: 'Inter', system-ui, sans-serif;
    color: #0F172A;
    -webkit-font-smoothing: antialiased;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  #root { min-height: 100vh; }

  .phone-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .no-scrollbar::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }

  input:focus, textarea:focus, select:focus, button:focus { outline: none; }
  .tap { transition: none; }

  /* Kill animations for print */
  .fadein, .shake, .snack, .spinner { animation: none !important; }

  /* Page layout: 2 phones per A4 portrait */
  .page {
    width: 210mm;
    height: 297mm;
    padding: 12mm 10mm;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 8mm;
    background: #fff;
    break-after: page;
    page-break-after: always;
  }
  .page:last-child { break-after: auto; page-break-after: auto; }
  .page-header {
    grid-column: 1 / -1;
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid #E3E8EF;
    padding-bottom: 6mm;
  }
  .page-title {
    font-size: 18px; font-weight: 700; color: #0F172A; letterSpacing: -0.3px;
  }
  .page-title small {
    display: block; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500; color: #64748B;
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
  }
  .page-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: #64748B;
  }

  .cell {
    display: flex; flex-direction: column; align-items: center;
    gap: 10px;
    break-inside: avoid; page-break-inside: avoid;
  }
  .cell-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600; color: #0F766E;
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .cell-title {
    font-size: 13px; font-weight: 600; color: #0F172A;
    margin-top: -6px;
  }
  .phone-shell {
    /* Each phone is 390x844 — scaled to fit column */
    transform: scale(0.24);
    transform-origin: top center;
    width: 390px; height: 844px;
    margin-bottom: -642px; /* compensate scaled height: 844*(1-.24)=641.4 */
  }

  @page { size: A4 portrait; margin: 0; }

  @media print {
    html, body { background: #fff; }
    .page { box-shadow: none; }
  }

  /* Screen-only preview styling */
  @media screen {
    body {
      display: flex; flex-direction: column; align-items: center;
      padding: 24px; gap: 20px; background: #CBD5E1;
    }
    .page {
      box-shadow: 0 10px 30px rgba(15,23,42,.12);
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/theme.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/frame.jsx"></script>
<script type="text/babel" src="src/components.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/components_nav.jsx"></script>
<script type="text/babel" src="src/screens/login.jsx"></script>
<script type="text/babel" src="src/screens/signup.jsx"></script>
<script type="text/babel" src="src/screens/client.jsx"></script>
<script type="text/babel" src="src/screens/os.jsx"></script>
<script type="text/babel" src="src/screens/dashboard.jsx"></script>
<script type="text/babel" src="src/screens/os_list.jsx"></script>
<script type="text/babel" src="src/screens/notifications.jsx"></script>
<script type="text/babel" src="src/screens/profile.jsx"></script>

<script type="text/babel" data-presets="env,react">
const theme = getTheme('light', 'teal');
const themed = { ...theme, _logoVariant: 'tag' };

const noopNav = {
  push: () => {}, pop: () => {}, replace: () => {},
};
const noopMsg = () => {};

const SCREENS = [
  { key: 'login',         label: '01 Login',          title: 'Autenticação',
    render: () => <LoginScreen theme={themed} nav={noopNav} showMessage={noopMsg} /> },
  { key: 'signup',        label: '02 Cadastro',       title: 'Criar conta',
    render: () => <SignupScreen theme={themed} nav={noopNav} showMessage={noopMsg} /> },
  { key: 'dashboard',     label: '03 Dashboard',      title: 'Resumo da operação',
    render: () => <DashboardScreen theme={themed} nav={noopNav} showMessage={noopMsg} osList={INITIAL_OS} clients={INITIAL_CLIENTS} />,
    bottomNav: true, navKey: 'dashboard' },
  { key: 'oslist',        label: '06 Lista de OS',    title: 'Ordens de serviço',
    render: () => <OSListScreen theme={themed} nav={noopNav} showMessage={noopMsg} osList={INITIAL_OS} clients={INITIAL_CLIENTS} params={{}} />,
    bottomNav: true, navKey: 'oslist' },
  { key: 'os',            label: '04 Nova OS',        title: 'Registrar serviço',
    render: () => <OSScreen theme={themed} nav={noopNav} showMessage={noopMsg} clients={INITIAL_CLIENTS} onSave={() => {}} /> },
  { key: 'client',        label: '05 Novo Cliente',   title: 'Cadastro de cliente',
    render: () => <ClientScreen theme={themed} nav={noopNav} showMessage={noopMsg} clients={INITIAL_CLIENTS} setClients={() => {}} /> },
  { key: 'notifications', label: '07 Notificações',   title: 'Central de alertas',
    render: () => <NotificationsScreen theme={themed} nav={noopNav} showMessage={noopMsg} />,
    bottomNav: true, navKey: 'notifications' },
  { key: 'profile',       label: '08 Perfil',         title: 'Conta e preferências',
    render: () => <ProfileScreen theme={themed} nav={noopNav} showMessage={noopMsg} />,
    bottomNav: true, navKey: 'profile' },
];

function PrintPhone({ screen }) {
  const bottomNavEl = screen.bottomNav ? (
    <BottomNav theme={themed} current={screen.navKey}
      onChange={() => {}} onNewOS={() => {}} />
  ) : null;
  return (
    <div className="cell">
      <div className="cell-label">{screen.label}</div>
      <div className="phone-shell">
        <DeviceFrame theme={themed} bottomNav={bottomNavEl}>
          {screen.render()}
        </DeviceFrame>
      </div>
      <div className="cell-title">{screen.title}</div>
    </div>
  );
}

function CoverPage() {
  return (
    <div className="page" style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', gap: '20mm' }}>
      <div style={{ transform: 'scale(1.4)' }}>
        <AppLogo theme={themed} size={96} variant="tag" />
      </div>
      <div style={{ textAlign: 'center', marginTop: '10mm' }}>
        <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: 0.8, color: '#64748B', textTransform: 'uppercase', marginBottom: 8 }}>
          Projeto ServiceFlow · Sprint UI
        </div>
        <div style={{ fontSize: 32, fontWeight: 700, letterSpacing: -0.8, color: '#0F172A' }}>
          Catálogo de Telas
        </div>
        <div style={{ fontSize: 14, color: '#64748B', marginTop: 10, maxWidth: '130mm', lineHeight: 1.5 }}>
          Protótipo mobile Android contendo 8 telas — autenticação, cadastro de clientes,
          registro de ordens de serviço, dashboard de gestão, lista com busca e filtros,
          notificações e perfil.
        </div>
      </div>
      <div style={{
        position: 'absolute', bottom: '15mm', left: 0, right: 0,
        display: 'flex', justifyContent: 'center', gap: 24,
        fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
        color: '#64748B', letterSpacing: 0.4, textTransform: 'uppercase',
      }}>
        <span>Cor primária · #0F766E</span>
        <span>·</span>
        <span>Tipografia · Inter</span>
        <span>·</span>
        <span>8 telas</span>
      </div>
    </div>
  );
}

function Catalog() {
  // Pair screens two per page
  const pairs = [];
  for (let i = 0; i < SCREENS.length; i += 2) {
    pairs.push(SCREENS.slice(i, i + 2));
  }
  return (
    <>
      <CoverPage />
      {pairs.map((pair, pageIdx) => (
        <div className="page" key={pageIdx} style={{ position: 'relative' }}>
          <div className="page-header">
            <div className="page-title">
              <small>ServiceFlow — Catálogo de Telas</small>
              Página {pageIdx + 2} / {pairs.length + 1}
            </div>
            <div className="page-meta">
              {pair.map(s => s.label).join(' · ')}
            </div>
          </div>
          {pair.map(screen => <PrintPhone key={screen.key} screen={screen} />)}
        </div>
      ))}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Catalog />);

// Auto-print once fonts + React are ready
(async () => {
  if (document.fonts && document.fonts.ready) await document.fonts.ready;
  await new Promise(r => setTimeout(r, 800));
  window.print();
})();
</script>

</body>
</html>
