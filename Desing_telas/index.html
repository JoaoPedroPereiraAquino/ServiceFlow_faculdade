<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ServiceFlow — Android Mobile Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-app: #eef2f6;
    --panel: #ffffff;
    --border: #e3e8ef;
    --text: #0f172a;
    --muted: #64748b;
    --primary: #0F766E;
    --primary-ink: #083F3C;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-app);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }

  /* Scrollbar styling inside device screens */
  .phone-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .no-scrollbar::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }

  /* Shared input focus outline */
  input:focus, textarea:focus, select:focus, button:focus { outline: none; }

  /* Ripple-ish tap feedback */
  .tap { transition: transform .08s ease, opacity .08s ease, background .15s ease; }
  .tap:active { transform: scale(0.985); opacity: .9; }

  /* Shake for invalid form */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }
  .shake { animation: shake .35s ease; }

  /* Fade in on screen change — transform only, always visible at rest */
  @keyframes fadein {
    from { transform: translateY(6px); }
    to   { transform: translateY(0); }
  }
  .fadein { animation: fadein .22s ease both; opacity: 1; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    animation: spin .8s linear infinite;
  }

  /* Snackbar */
  @keyframes snackup {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  .snack { animation: snackup .25s ease; }

  /* Toggle chip on cards */
  .kpi-card { cursor: pointer; }
  .kpi-card:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(15,23,42,.06); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
